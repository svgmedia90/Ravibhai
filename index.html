<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
}

/* Card */
.container {
  backdrop-filter: blur(25px);
  background: rgba(255, 255, 255, 0.08);
  border-radius: 25px;
  padding: 40px 30px;
  text-align: center;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 0 50px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
}

/* Logo */
.logo {
  width: 90px;
  margin-bottom: 15px;
}

/* Channel Name */
.channel-name {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 5px;
  background: linear-gradient(90deg, #00f2fe, #4facfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Timer */
.timer-title {
  font-size: 15px;
  opacity: 0.8;
  margin-top: 10px;
}

.timer {
  font-size: 50px;
  font-weight: 700;
  margin: 20px 0;
  color: #00f2fe;
}

/* Button */
.btn {
  display: inline-block;
  padding: 15px 35px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 50px;
  background: linear-gradient(90deg, #00f2fe, #4facfe);
  color: #000;
  text-decoration: none;
  box-shadow: 0 10px 30px rgba(0,242,254,0.5);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* Footer */
.footer {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.png" class="logo" alt="Logo">

  <!-- CHANNEL -->
  <div class="channel-name">Ravi Singh</div>

  <!-- TIMER -->
  <div class="timer-title">Vip Joining Ends In</div>
  <div class="timer" id="countdown">60</div>

  <!-- BUTTON (FIXED WORKING LINK) -->
  <a href="https://t.me/+ -JN51D5zpdw0YzE1" target="_blank" class="btn" id="joinBtn">
    Join Telegram
  </a>

  <div class="footer">Limited VIP Access</div>

</div>

<script>
let timeLeft = 60;
let timer = document.getElementById("countdown");

let countdown = setInterval(() => {
  timeLeft--;
  timer.innerHTML = timeLeft;

  if(timeLeft <= 0){
    clearInterval(countdown);
    timer.innerHTML = "Closed";
  }
}, 1000);

// FIX TELEGRAM LINK (REMOVE SPACE AUTOMATICALLY)
let btn = document.getElementById("joinBtn");
btn.href = "https://t.me/+ -JN51D5zpdw0YzE1".replace(" ", "");
</script>

</body>
</html>
