<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  overflow: hidden;
}

/* Background Glow */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: rgba(0,255,255,0.15);
  filter: blur(120px);
  top: -100px;
  left: -100px;
}

body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: rgba(0,150,255,0.15);
  filter: blur(120px);
  bottom: -100px;
  right: -100px;
}

/* Card */
.container {
  backdrop-filter: blur(25px);
  background: rgba(255, 255, 255, 0.08);
  border-radius: 25px;
  padding: 40px 30px;
  text-align: center;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 0 50px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  animation: fadeIn 1.5s ease;
}

/* Logo */
.logo {
  width: 90px;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 10px rgba(0,255,255,0.6));
}

/* Channel Name */
.channel-name {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 5px;
  background: linear-gradient(90deg, #00f2fe, #4facfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Timer Title */
.timer-title {
  font-size: 15px;
  opacity: 0.8;
  margin-top: 10px;
}

/* Timer */
.timer {
  font-size: 52px;
  font-weight: 700;
  margin: 20px 0;
  color: #00f2fe;
  animation: pulse 1s infinite alternate;
}

/* Button */
.btn {
  display: inline-block;
  padding: 15px 35px;
  font-size: 18px;
  font-weight: 600;
  border-radius: 50px;
  background: linear-gradient(90deg, #00f2fe, #4facfe);
  color: #000;
  text-decoration: none;
  transition: 0.3s;
  box-shadow: 0 10px 30px rgba(0,242,254,0.5);
}

.btn:hover {
  transform: scale(1.07);
  box-shadow: 0 15px 40px rgba(0,242,254,0.9);
}

/* Footer text */
.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.6;
}

/* Animations */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(40px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes pulse {
  from {opacity: 0.6;}
  to {opacity: 1;}
}

</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="logo.png" class="logo" alt="Logo">

  <!-- CHANNEL NAME -->
  <div class="channel-name">Ravi Singh</div>

  <!-- TIMER TITLE -->
  <div class="timer-title">Vip Joining Ends In</div>

  <!-- TIMER -->
  <div class="timer" id="countdown">60</div>

  <!-- BUTTON -->
  <a href="https://t.me/+-JN51D5zpdw0YzE1" class="btn">Join Telegram</a>

  <div class="footer">Limited VIP Access</div>

</div>

<script>
let timeLeft = 60;
let timer = document.getElementById("countdown");

let countdown = setInterval(() => {
  timeLeft--;
  timer.innerHTML = timeLeft;

  if(timeLeft <= 0){
    clearInterval(countdown);
    timer.innerHTML = "Closed";
  }
}, 1000);
</script>

</body>
</html>
