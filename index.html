<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Entry</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#0a0a0a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card */
.card{
  width:90%;
  max-width:380px;
  padding:30px;
  border-radius:20px;
  text-align:center;
  background:linear-gradient(145deg,#111,#1f1f1f);
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}

/* Logo */
.logo{
  width:80px;
  margin-bottom:10px;
}

/* Name */
.name{
  font-size:26px;
  font-weight:700;
}

/* Timer */
.subtitle{
  margin-top:10px;
  opacity:0.7;
}

.timer{
  font-size:48px;
  margin:20px 0;
  color:#00ffcc;
  font-weight:700;
}

/* Button */
.btn{
  display:block;
  width:100%;
  padding:14px;
  border-radius:12px;
  background:#00ffcc;
  color:#000;
  font-weight:600;
  text-decoration:none;
  font-size:18px;
  transition:0.3s;
}

.btn:hover{
  background:#00ddb3;
}
</style>
</head>

<body>

<div class="card">

  <img src="logo.png" class="logo">

  <div class="name">Ravi Singh</div>

  <div class="subtitle">Vip Joining Ends In</div>

  <div class="timer" id="time">60</div>

  <!-- BUTTON -->
  <a href="#" onclick="openTelegram()" class="btn">
    Join Telegram
  </a>

</div>

<script>
// TIMER
let t = 60;
let timer = setInterval(()=>{
  t--;
  document.getElementById("time").innerText = t;

  if(t<=0){
    clearInterval(timer);
    document.getElementById("time").innerText="Closed";
  }
},1000);

// TELEGRAM OPEN FIX (APP + BROWSER)
function openTelegram(){
  let appLink = "tg://join?invite=PaC-KyThMfYxNDFl";
  let webLink = "https://t.me/+PaC-KyThMfYxNDFl";

  // try app
  window.location.href = appLink;

  // fallback to browser
  setTimeout(()=>{
    window.location.href = webLink;
  },1000);
}
</script>

</body>
</html>
